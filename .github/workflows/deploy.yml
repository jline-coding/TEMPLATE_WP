# ═══════════════════════════════════════════════════════════════
#  Deploy Workflow — FTP Deploy
#
#  Triggers:
#    push master  → production config → FTP deploy
#    push staging → test config       → FTP deploy
#    workflow_dispatch → chọn environment thủ công
# ═══════════════════════════════════════════════════════════════

name: Deploy

on:
  push:
    branches: [master, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Chọn môi trường deploy'
        type: choice
        options:
          - production
          - test
        default: test

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Kéo Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # Xác định môi trường
      # ─────────────────────────────────────────────
      - name: 🔍 Xác định môi trường
        run: |
          ENVIRONMENT=""

          if [[ "$GITHUB_REF" == refs/heads/master ]]; then
            ENVIRONMENT="production"
          elif [[ "$GITHUB_REF" == refs/heads/staging ]]; then
            ENVIRONMENT="test"
          fi

          # workflow_dispatch override
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ inputs.environment }}"
          fi

          if [[ -z "$ENVIRONMENT" ]]; then
            echo "⚠️ Không xác định được môi trường — bỏ qua."
            exit 0
          fi

          # Đọc config từ deploy-config.json
          DEPLOY_METHOD=$(jq -r ".${ENVIRONMENT}.deploy_method // \"ssh\"" deploy-config.json)
          SERVER_NAME=$(jq -r ".${ENVIRONMENT}.server // empty" deploy-config.json | tr 'a-z' 'A-Z')
          BUILD_CMD=$(jq -r '.build_command // "npm run build"' deploy-config.json)

          # Kích hoạt trạng thái dựa vào deploy_method
          if [[ "$DEPLOY_METHOD" == "ssh" ]]; then
            echo "SHOULD_SSH=true" >> $GITHUB_ENV
          elif [[ "$DEPLOY_METHOD" == "ftp" ]]; then
            echo "SHOULD_FTP=true" >> $GITHUB_ENV
          elif [[ "$DEPLOY_METHOD" == "zip" ]]; then
            echo "SHOULD_ZIP=true" >> $GITHUB_ENV
          else
            echo "⚠️ Phương thức chưa xác định. Chuyển hướng mặc định về SSH."
            echo "SHOULD_SSH=true" >> $GITHUB_ENV
          fi

          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "SERVER_NAME=$SERVER_NAME" >> $GITHUB_ENV
          echo "BUILD_CMD=$BUILD_CMD" >> $GITHUB_ENV

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          printf "║   🚀 Pipeline Deploy [%-24s]║\n" "$ENVIRONMENT"
          printf "║   Phương thức: %-30s║\n" "$DEPLOY_METHOD"
          printf "║   Server: %-35s║\n" "$SERVER_NAME"
          echo "╚══════════════════════════════════════════════╝"

      # ─────────────────────────────────────────────
      # Build
      # ─────────────────────────────────────────────
      - name: ⚙️ Cài đặt Node.js
        if: env.SHOULD_SSH == 'true' || env.SHOULD_FTP == 'true' || env.SHOULD_ZIP == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Cài đặt dependencies
        if: env.SHOULD_SSH == 'true' || env.SHOULD_FTP == 'true' || env.SHOULD_ZIP == 'true'
        run: npm ci

      - name: 💾 Cache WordPress download
        if: env.SHOULD_SSH == 'true' || env.SHOULD_FTP == 'true' || env.SHOULD_ZIP == 'true'
        uses: actions/cache@v4
        with:
          path: public
          key: wp-public-${{ hashFiles('scripts/download-wp.js', 'deploy-config.json') }}

      - name: 🔨 Build dự án
        if: env.SHOULD_SSH == 'true' || env.SHOULD_FTP == 'true' || env.SHOULD_ZIP == 'true'
        run: ${{ env.BUILD_CMD }}
        env:
          DEPLOY_ENV: ${{ env.ENVIRONMENT }}

      # ─────────────────────────────────────────────
      # ZIP Mode
      # ─────────────────────────────────────────────
      - name: ℹ️ Chế độ ZIP (Chỉ tạo bản Build)
        if: env.SHOULD_ZIP == 'true'
        run: echo "Chế độ ZIP không cần đẩy file qua mạng. Hãy tạo Tag để Release code nhé!"

      # ─────────────────────────────────────────────
      # Deploy Scripts Options (Cài Node Packages)
      # ─────────────────────────────────────────────
      - name: 📦 Cài đặt thư viện Deploy (FTP / Crypt)
        if: env.SHOULD_FTP == 'true' || env.SHOULD_SSH == 'true'
        run: npm install --no-save basic-ftp apache-crypt

      - name: 🚀 Triển khai qua FTP
        if: env.SHOULD_FTP == 'true'
        run: node .github/scripts/deploy-ftp.cjs
        env:
          DEPLOY_ENV: ${{ env.ENVIRONMENT }}
          GITHUB_REPO: ${{ github.repository }}
          SERVER_SECRET_JSON: ${{ secrets[format('{0}_CONFIG', env.SERVER_NAME)] }}

      # ─────────────────────────────────────────────
      # SSH Deploy
      # ─────────────────────────────────────────────
      - name: 🚀 Triển khai qua SSH/Rsync
        if: env.SHOULD_SSH == 'true'
        run: bash .github/scripts/deploy-ssh.sh
        env:
          DEPLOY_ENV: ${{ env.ENVIRONMENT }}
          GITHUB_REPO: ${{ github.repository }}
          SERVER_SECRET_JSON: ${{ secrets[format('{0}_CONFIG', env.SERVER_NAME)] }}
